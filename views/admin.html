<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRETEK — Backoffice</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <span class="header-tag">backoffice</span>
      <h1 class="logo">KRETEK</h1>
      <button id="btn-sair" class="header-tag btn-logout">sair</button>
    </div>
  </header>

  <main>

    <!-- SEÇÃO: ADICIONAR ROUPA -->
    <section class="secao-form" id="adicionar">
      <div class="secao-label">01 — ADICIONAR</div>
      <h2 class="secao-titulo">Nova peça</h2>

      <form id="form-adicionar">
        <div class="input-group">
          <label>Nome da peça</label>
          <input type="text" id="input-nome" placeholder="ex: camisa polo" required />
        </div>
        <div class="input-group">
          <label>Cores</label>
          <input type="text" id="input-cor" placeholder="ex: azul, branca" required />
        </div>
        <div class="input-group">
          <label>Tamanhos</label>
          <input type="text" id="input-tamanho" placeholder="ex: P, M, G" />
        </div>
        <div class="input-group">
          <label>Preço (R$)</label>
          <input type="number" id="input-preco" placeholder="ex: 99.90" step="0.01" min="0" required />
        </div>
        <div class="input-group">
          <label>Foto (URL)</label>
          <input type="url" id="input-foto" placeholder="https://..." />
        </div>
        <div class="input-group">
          <label>Descrição</label>
          <input type="text" id="input-descricao" placeholder="ex: peça exclusiva, produção limitada" />
        </div>
        <button type="submit">ADICIONAR PEÇA →</button>
      </form>

      <p id="mensagem"></p>
    </section>

    <!-- SEÇÃO: CATÁLOGO -->
    <section class="secao-lista" id="catalogo">
      <div class="secao-label">02 — CATÁLOGO</div>
      <h2 class="secao-titulo">Peças cadastradas</h2>
      <div id="lista"></div>
    </section>

  </main>

  <footer>
    <span>KRETEK © 2026</span>
  </footer>

  <script src="/admin.js"></script>
</body>
</html>
